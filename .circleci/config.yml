version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.22
    working_directory: ~/project

commands:
  setup:
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo corepack enable && corepack prepare pnpm@9 --activate
      - restore_cache:
          keys:
            - pnpm-deps-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-deps-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - node_modules
            - apps/web/node_modules
            - apps/agent/node_modules
            - packages/schemas/node_modules
            - packages/eslint-config/node_modules

  check-web-changes:
    description: Check if web-relevant files changed since last deploy
    steps:
      - run:
          name: Check for web-relevant changes
          command: |
            # Compare current commit against its parent
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Check if any changed file is outside docs/planning-only paths
            HAS_WEB_CHANGES=false
            printf '%s\n' "$CHANGED_FILES" > /tmp/web_changed_files.txt
            while IFS= read -r file; do
              case "$file" in
                .planning/*|*.md|docs/*) ;;
                *) HAS_WEB_CHANGES=true; break ;;
              esac
            done < /tmp/web_changed_files.txt

            if [ "$HAS_WEB_CHANGES" = "false" ]; then
              echo "Only docs/planning changes detected — skipping web deploy."
              circleci-agent step halt
            else
              echo "Web-relevant changes detected — proceeding with deploy."
            fi

  check-agent-changes:
    description: Check if agent-relevant files changed since last deploy
    steps:
      - run:
          name: Check for agent-relevant changes
          command: |
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
            echo "Changed files:"
            echo "$CHANGED_FILES"

            HAS_AGENT_CHANGES=false
            printf '%s\n' "$CHANGED_FILES" > /tmp/agent_changed_files.txt
            while IFS= read -r file; do
              case "$file" in
                .planning/*|*.md|docs/*) ;;
                *) HAS_AGENT_CHANGES=true; break ;;
              esac
            done < /tmp/agent_changed_files.txt

            if [ "$HAS_AGENT_CHANGES" = "false" ]; then
              echo "Only docs/planning changes detected — skipping agent deploy."
              circleci-agent step halt
            else
              echo "Agent-relevant changes detected — proceeding with deploy."
            fi

jobs:
  lint-and-build:
    executor: node
    steps:
      - setup
      - restore_cache:
          keys:
            - turbo-cache-v1-{{ .Branch }}-{{ .Revision }}
            - turbo-cache-v1-{{ .Branch }}-
            - turbo-cache-v1-
      - run:
          name: Lint & Build
          command: pnpm turbo lint build --cache-dir=.turbo
      - save_cache:
          key: turbo-cache-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - .turbo

  migrate:
    executor: node
    steps:
      - setup
      - check-agent-changes
      - run:
          name: Generate Prisma Client
          command: npx prisma generate
          working_directory: ~/project/apps/agent
      - run:
          name: Deploy migrations
          command: npx prisma migrate deploy
          working_directory: ~/project/apps/agent

  deploy-agent:
    executor: node
    steps:
      - checkout
      - check-agent-changes
      - run:
          name: Install Railway CLI
          command: sudo npm install -g @railway/cli
      - run:
          name: Deploy to Railway
          command: railway up --service $RAILWAY_SERVICE_ID --ci

  deploy-web:
    executor: node
    steps:
      - setup
      - check-web-changes
      - restore_cache:
          keys:
            - turbo-cache-v1-{{ .Branch }}-{{ .Revision }}
            - turbo-cache-v1-{{ .Branch }}-
            - turbo-cache-v1-
      - run:
          name: Install Vercel CLI
          command: sudo npm install -g vercel@latest
      - run:
          name: Pull Vercel environment
          command: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - run:
          name: Build with Vercel
          command: vercel build --prod --token=$VERCEL_TOKEN
      - run:
          name: Deploy to Vercel
          command: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  notify-success:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Email Slack channel via SMTP
          command: |
            set -eu

            RECIPIENT="${SLACK_CHANNEL_EMAIL:-atlus-deck-aaaatjj2cixlodxayed2erpcme@lumenalta.slack.com}"
            WORKFLOW_URL="https://app.circleci.com/pipelines/workflows/$CIRCLE_WORKFLOW_ID"
            export RECIPIENT WORKFLOW_URL

            python3 -c "import os, smtplib, ssl; from email.message import EmailMessage; recipient=os.environ['RECIPIENT']; workflow_url=os.environ['WORKFLOW_URL']; smtp_host=os.environ['SMTP_HOST']; smtp_port=int(os.environ.get('SMTP_PORT','465')); smtp_username=os.environ['SMTP_USERNAME']; smtp_password=os.environ['SMTP_PASSWORD']; smtp_from=os.environ.get('SMTP_FROM', smtp_username); smtp_secure=os.environ.get('SMTP_SECURE','true').lower()=='true'; repo=os.environ['CIRCLE_PROJECT_REPONAME']; branch=os.environ['CIRCLE_BRANCH']; sha=os.environ['CIRCLE_SHA1']; text='Hi team, a new AtlusDeck build is ready for testing: https://lumenalta-hackathon.vercel.app\n\nCommit: {}\nWorkflow: {}'.format(sha, workflow_url); html='<p>Hi team, a new AtlusDeck build is ready for testing: <a href=\"https://lumenalta-hackathon.vercel.app\">https://lumenalta-hackathon.vercel.app</a>.</p><p><strong>Commit:</strong> <code>{}</code><br /><strong>Workflow:</strong> <a href=\"{}\">Open workflow</a></p>'.format(sha, workflow_url); message=EmailMessage(); message['Subject']='[Deploy Success] {} on {}'.format(repo, branch); message['From']=smtp_from; message['To']=recipient; message.set_content(text); message.add_alternative(html, subtype='html'); server=smtplib.SMTP_SSL(smtp_host, smtp_port, context=ssl.create_default_context()) if smtp_secure else smtplib.SMTP(smtp_host, smtp_port); (None if smtp_secure else server.starttls(context=ssl.create_default_context())); server.login(smtp_username, smtp_password); server.send_message(message); server.quit(); print('Email sent to {} via {}:{}'.format(recipient, smtp_host, smtp_port))"

workflows:
  deploy:
    jobs:
      - lint-and-build:
          filters:
            branches:
              only: main
      - migrate:
          requires:
            - lint-and-build
      - deploy-agent:
          requires:
            - migrate
      - deploy-web:
          requires:
            - deploy-agent
      - notify-success:
          requires:
            - deploy-web
          filters:
            branches:
              only: main
