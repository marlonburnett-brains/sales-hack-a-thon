services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "4111:4111"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4111/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

